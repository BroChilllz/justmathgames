<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Show Hub – JMG</title>
<style>
  :root {
    --bg: #121215;
    --surface: #1a1b1f;
    --surface2: #232527;
    --border: #34373d;
    --border-soft: #272930;
    --text: #f2f4f5;
    --muted: #9a9ca3;
    --accent: #22d3a5;
    --accent-dim: rgba(34,211,165,0.15);
    --accent-hover: #1fbc95;
    --red: #f85a5a;
    --topbar: 48px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Builder Sans","Helvetica Neue",Helvetica,Arial,sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 200;
    height: var(--topbar);
    background: #191b1f;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s;
  }
  .back-btn:hover { background: var(--surface2); border-color: #5f626a; }
  .hub-title {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: -0.02em;
  }
  .hub-title span { color: var(--accent); }
  .search-wrap {
    flex: 1;
    max-width: 480px;
    margin-left: auto;
    position: relative;
    display: flex;
    align-items: center;
  }
  .search-wrap input {
    width: 100%;
    background: #111217;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font: inherit;
    font-size: 14px;
    padding: 8px 40px 8px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: #5f626a; background: #16171d; }
  .search-wrap input::placeholder { color: #5f626a; }
  .search-wrap button {
    position: absolute;
    right: 6px;
    background: var(--accent);
    border: none;
    border-radius: 5px;
    color: #111217;
    cursor: pointer;
    padding: 4px 10px;
    font-size: 13px;
    font-weight: 800;
  }
  .search-wrap button:hover { background: var(--accent-hover); }

  /* HERO */
  .hero {
    position: relative;
    height: 320px;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center 20%;
    filter: blur(2px) saturate(0.65);
    transform: scale(1.05);
  }
  .hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(18,18,21,0.15) 0%, rgba(18,18,21,0.82) 65%, var(--bg) 100%);
  }
  .hero-content {
    position: relative;
    z-index: 2;
    padding: 0 24px 24px;
    display: flex;
    align-items: flex-end;
    gap: 20px;
  }
  .hero-poster {
    width: 100px;
    height: 150px;
    border-radius: 6px;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.12);
    flex-shrink: 0;
    box-shadow: 0 8px 28px rgba(0,0,0,0.6);
  }
  .hero-info { flex: 1; min-width: 0; }
  .hero-title {
    font-size: 32px;
    font-weight: 900;
    line-height: 1.05;
    text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    margin-bottom: 6px;
  }
  .hero-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
  }
  .badge {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    letter-spacing: 0.04em;
  }
  .badge.rating { color: #ffd700; border-color: rgba(255,215,0,0.3); background: rgba(255,215,0,0.08); }
  .badge.status-on { color: var(--accent); border-color: rgba(34,211,165,0.35); background: var(--accent-dim); }
  .hero-overview {
    font-size: 13px;
    color: #c8cacf;
    line-height: 1.55;
    max-width: 560px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .hero-actions { margin-top: 14px; }
  .play-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #111217;
    border: none;
    border-radius: 7px;
    padding: 10px 22px;
    font: inherit;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.15s;
  }
  .play-btn:hover { background: var(--accent-hover); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border-soft);
    padding: 0 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    padding: 12px 14px;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }

  /* GRID */
  .section { padding: 0 20px 28px; }
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding-top: 20px;
  }
  .section-head h2 { font-size: 16px; font-weight: 900; }

  .show-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
  }
  .show-card {
    background: var(--surface);
    border: 1px solid transparent;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    position: relative;
  }
  .show-card:hover { transform: translateY(-3px); border-color: var(--border); background: var(--surface2); }
  .show-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
  .show-card .no-poster {
    width: 100%;
    aspect-ratio: 2/3;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    color: var(--muted);
  }
  .show-card-info { padding: 8px 10px 10px; }
  .show-card-title {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 3px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .show-card-year { font-size: 11px; color: var(--muted); }
  .show-card-score {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,0.75);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 4px;
    font-size: 10px;
    font-weight: 800;
    color: #ffd700;
    padding: 2px 5px;
  }

  /* DETAIL MODAL */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    z-index: 500;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 16px;
    overflow-y: auto;
  }
  .modal-backdrop.open { display: flex; }

  .detail-modal {
    background: #111217;
    border: 1px solid var(--border);
    border-radius: 10px;
    width: min(920px, 100%);
    margin: auto;
    box-shadow: 0 28px 80px rgba(0,0,0,0.65);
    position: relative;
    overflow: hidden;
  }

  .detail-backdrop-img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    object-position: center 20%;
    display: block;
  }
  .detail-backdrop-placeholder {
    width: 100%;
    height: 220px;
    background: linear-gradient(135deg, #1a1b21 0%, #2a2b36 100%);
  }
  .detail-grad {
    height: 80px;
    margin-top: -80px;
    background: linear-gradient(to bottom, transparent, #111217);
    position: relative;
    z-index: 1;
  }

  .detail-body {
    padding: 0 20px 0;
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .detail-poster {
    width: 120px;
    margin-top: -50px;
    border-radius: 6px;
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    flex-shrink: 0;
  }
  .detail-info { padding-top: 8px; }
  .detail-title { font-size: 26px; font-weight: 900; line-height: 1.1; margin-bottom: 8px; }
  .detail-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .detail-overview { font-size: 14px; color: #c8cacf; line-height: 1.6; margin-bottom: 14px; }

  /* EPISODE PICKER */
  .episode-picker {
    border-top: 1px solid var(--border-soft);
    padding: 16px 20px 0;
  }
  .ep-picker-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .ep-picker-head h3 { font-size: 15px; font-weight: 800; }
  .season-select-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .season-select-wrap label { font-size: 12px; color: var(--muted); font-weight: 700; }
  .season-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font: inherit;
    font-size: 13px;
    padding: 5px 10px;
    cursor: pointer;
    outline: none;
  }
  .season-select:focus { border-color: var(--accent); }

  .season-stats {
    font-size: 12px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    padding: 4px 10px;
  }

  .ep-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
    max-height: 340px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .ep-grid::-webkit-scrollbar { width: 5px; }
  .ep-grid::-webkit-scrollbar-track { background: transparent; }
  .ep-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .ep-card {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: 7px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    transition: background 0.12s, border-color 0.12s;
    text-align: left;
  }
  .ep-card:hover { background: var(--surface2); border-color: var(--border); }
  .ep-card:hover .ep-num { background: var(--accent); color: #111217; }
  .ep-num {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.12s, color 0.12s;
  }
  .ep-info { min-width: 0; flex: 1; }
  .ep-title {
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .ep-air { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .ep-loading {
    text-align: center;
    padding: 28px;
    color: var(--muted);
    font-size: 13px;
    grid-column: 1 / -1;
  }

  .modal-close {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 20;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(18,18,23,0.88);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover { border-color: var(--red); color: var(--red); }

  /* PLAYER */
  .player-overlay {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 1000;
    display: none;
    flex-direction: column;
  }
  .player-overlay.open { display: flex; }
  .player-bar {
    background: rgba(25,27,31,0.92);
    border-bottom: 1px solid var(--border-soft);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .player-bar .back-btn-player {
    background: rgba(242,244,245,0.9);
    border: none;
    border-radius: 6px;
    color: #191b1f;
    cursor: pointer;
    font: inherit;
    font-weight: 700;
    font-size: 13px;
    padding: 7px 12px;
  }
  .player-bar .back-btn-player:hover { background: #fff; }
  .player-title { font-size: 13px; font-weight: 700; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-ep-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .player-ep-controls select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font: inherit;
    font-size: 12px;
    padding: 4px 8px;
    cursor: pointer;
  }
  .player-frame { flex: 1; width: 100%; border: none; }

  /* STATES */
  .state-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .state-msg .icon { font-size: 48px; margin-bottom: 14px; }
  .state-msg h3 { font-size: 18px; font-weight: 800; margin-bottom: 6px; color: var(--text); }
  .state-msg p { font-size: 14px; max-width: 340px; margin: 0 auto; }

  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  @media (max-width: 600px) {
    .hero { height: 260px; }
    .hero-title { font-size: 22px; }
    .hero-poster { width: 70px; height: 105px; }
    .detail-body { grid-template-columns: 90px 1fr; }
    .detail-poster { width: 90px; margin-top: -40px; }
    .detail-title { font-size: 20px; }
    .player-ep-controls { display: none; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <div class="hub-title">Show<span>Hub</span></div>
  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="Search any show…" autocomplete="off"
      oninput="handleSearchInput()" onkeydown="if(event.key==='Enter') doSearch()">
    <button onclick="doSearch()">Go</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" data-tab="home" onclick="switchTab('home')">Home</button>
  <button class="tab" data-tab="trending" onclick="switchTab('trending')">Trending</button>
  <button class="tab" data-tab="toprated" onclick="switchTab('toprated')">Top Rated</button>
  <button class="tab" data-tab="airing" onclick="switchTab('airing')">Airing Now</button>
  <button class="tab" data-tab="results" onclick="switchTab('results')" id="resultsTab" style="display:none">Search Results</button>
</div>

<!-- HERO -->
<div class="hero" id="heroSection" style="display:none">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-gradient"></div>
  <div class="hero-content">
    <img class="hero-poster" id="heroPoster" src="" alt="">
    <div class="hero-info">
      <div class="hero-title" id="heroTitle"></div>
      <div class="hero-meta" id="heroMeta"></div>
      <div class="hero-overview" id="heroOverview"></div>
      <div class="hero-actions">
        <button class="play-btn" id="heroPlayBtn" onclick="playHeroShow()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2.5l10 5.5-10 5.5V2.5z"/></svg>
          Watch S1 E1
        </button>
      </div>
    </div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent"></div>

<!-- DETAIL MODAL -->
<div class="modal-backdrop" id="detailModal" onclick="closeDetailIfBackdrop(event)">
  <div class="detail-modal" id="detailModalInner">
    <button class="modal-close" onclick="closeDetail()">×</button>
    <div id="detailContent"></div>
    <div class="episode-picker" id="episodePicker" style="display:none">
      <div class="ep-picker-head">
        <h3>Episodes</h3>
        <div class="season-select-wrap">
          <label for="seasonSel">Season</label>
          <select class="season-select" id="seasonSel" onchange="loadSeason()"></select>
        </div>
        <div class="season-stats" id="seasonStats"></div>
      </div>
      <div class="ep-grid" id="epGrid"></div>
    </div>
  </div>
</div>

<!-- PLAYER OVERLAY -->
<div class="player-overlay" id="playerOverlay">
  <div class="player-bar">
    <button class="back-btn-player" onclick="closePlayer()">⬅ Back</button>
    <span class="player-title" id="playerTitle"></span>
    <div class="player-ep-controls" id="playerEpControls" style="display:none">
      <select id="playerSeasonSel" onchange="playerChangeSeason()"></select>
      <select id="playerEpSel" onchange="playerChangeEp()"></select>
    </div>
  </div>
  <iframe class="player-frame" id="playerFrame" allowfullscreen allow="fullscreen"></iframe>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const TMDB_KEY = 'YOUR_TMDB_API_KEY';
const TMDB = 'https://api.themoviedb.org/3';
const IMG_BASE = 'https://image.tmdb.org/t/p/';

// ─── STATE ───────────────────────────────────────────────────────────────────
let heroShowId = null;
let currentTab = 'home';
let searchTimeout = null;
let currentDetailShow = null;  // { id, title, seasons: [...] }
let playerShowId = null;
let playerShowTitle = '';
let playerCurrentSeason = 1;
let playerCurrentEp = 1;

// ─── INIT ─────────────────────────────────────────────────────────────────────
(async () => {
  const [trending, popular] = await Promise.all([
    tmdb('/trending/tv/week'),
    tmdb('/tv/popular')
  ]);
  const heroShows = trending?.results || [];
  const hero = heroShows[Math.floor(Math.random() * Math.min(5, heroShows.length))];
  if (hero) renderHero(hero);
  renderHomeTab({ trending: heroShows, popular: popular?.results || [] });
})();

// ─── TMDB FETCH ───────────────────────────────────────────────────────────────
async function tmdb(path, params = {}) {
  const url = new URL(TMDB + path);
  url.searchParams.set('api_key', TMDB_KEY);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  try {
    const res = await fetch(url.toString());
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

// ─── HERO ─────────────────────────────────────────────────────────────────────
function renderHero(show) {
  heroShowId = show.id;
  const bg = show.backdrop_path ? IMG_BASE + 'original' + show.backdrop_path : '';
  const poster = show.poster_path ? IMG_BASE + 'w342' + show.poster_path : '';
  const year = (show.first_air_date || '').slice(0, 4);
  const score = show.vote_average ? show.vote_average.toFixed(1) : '';

  document.getElementById('heroBg').style.backgroundImage = bg ? `url(${bg})` : '';
  document.getElementById('heroPoster').src = poster;
  document.getElementById('heroPoster').alt = show.name;
  document.getElementById('heroTitle').textContent = show.name;
  document.getElementById('heroOverview').textContent = show.overview || '';
  const meta = document.getElementById('heroMeta');
  meta.innerHTML = '';
  if (year) meta.innerHTML += `<span class="badge">${year}</span>`;
  if (score) meta.innerHTML += `<span class="badge rating">★ ${score}</span>`;
  document.getElementById('heroSection').style.display = 'flex';
}

function playHeroShow() {
  if (heroShowId) openPlayerDirect(heroShowId, document.getElementById('heroTitle').textContent, 1, 1);
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  if (tab === 'home') renderHomeSection();
  else if (tab === 'trending') renderSection('trending');
  else if (tab === 'toprated') renderSection('toprated');
  else if (tab === 'airing') renderSection('airing');
}

function renderHomeTab({ trending, popular }) {
  renderGridSection('mainContent', [
    { title: 'Trending This Week', shows: trending.slice(0, 12) },
    { title: 'Popular', shows: popular.slice(0, 12) }
  ]);
}

async function renderHomeSection() {
  document.getElementById('mainContent').innerHTML = skeletonGrid(2);
  document.getElementById('heroSection').style.display = 'flex';
  const [trending, popular] = await Promise.all([tmdb('/trending/tv/week'), tmdb('/tv/popular')]);
  renderGridSection('mainContent', [
    { title: 'Trending This Week', shows: trending?.results?.slice(0, 12) || [] },
    { title: 'Popular', shows: popular?.results?.slice(0, 12) || [] }
  ]);
}

async function renderSection(type) {
  document.getElementById('mainContent').innerHTML = skeletonGrid(1);
  document.getElementById('heroSection').style.display = 'none';
  let data, label;
  if (type === 'trending') { data = await tmdb('/trending/tv/week'); label = 'Trending This Week'; }
  else if (type === 'toprated') { data = await tmdb('/tv/top_rated'); label = 'Top Rated All Time'; }
  else { data = await tmdb('/tv/on_the_air'); label = 'Currently Airing'; }
  const shows = data?.results || [];
  renderGridSection('mainContent', [{ title: label, shows: shows.slice(0, 20) }]);
}

function renderGridSection(containerId, sections) {
  const container = document.getElementById(containerId);
  container.innerHTML = sections.map(({ title, shows }) => `
    <div class="section">
      <div class="section-head"><h2>${escHtml(title)}</h2></div>
      <div class="show-grid">${shows.map(showCardHtml).join('')}</div>
    </div>
  `).join('');
}

// ─── CARD HTML ────────────────────────────────────────────────────────────────
function showCardHtml(show) {
  const poster = show.poster_path ? `<img src="${IMG_BASE}w300${show.poster_path}" alt="${escHtml(show.name)}" loading="lazy">` : `<div class="no-poster">📺</div>`;
  const year = (show.first_air_date || '').slice(0, 4);
  const score = show.vote_average ? show.vote_average.toFixed(1) : '';
  return `
    <div class="show-card" onclick="openDetail(${show.id})">
      ${poster}
      ${score ? `<span class="show-card-score">★ ${score}</span>` : ''}
      <div class="show-card-info">
        <div class="show-card-title">${escHtml(show.name)}</div>
        ${year ? `<div class="show-card-year">${year}</div>` : ''}
      </div>
    </div>`;
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function handleSearchInput() {
  clearTimeout(searchTimeout);
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  searchTimeout = setTimeout(() => doSearch(), 400);
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  document.getElementById('heroSection').style.display = 'none';
  document.getElementById('resultsTab').style.display = '';
  switchTab('results');
  document.getElementById('mainContent').innerHTML = skeletonGrid(1);

  const data = await tmdb('/search/tv', { query: q });
  const shows = data?.results || [];
  if (!shows.length) {
    document.getElementById('mainContent').innerHTML = `
      <div class="state-msg"><div class="icon">🔍</div><h3>No results</h3><p>Nothing found for "${escHtml(q)}". Try a different title.</p></div>`;
    return;
  }
  renderGridSection('mainContent', [{ title: `Results for "${q}"`, shows }]);
}

// ─── DETAIL MODAL ─────────────────────────────────────────────────────────────
async function openDetail(id) {
  document.getElementById('detailModal').classList.add('open');
  document.getElementById('episodePicker').style.display = 'none';
  document.getElementById('detailContent').innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted)">Loading…</div>`;
  currentDetailShow = null;

  const show = await tmdb(`/tv/${id}`);
  if (!show) {
    document.getElementById('detailContent').innerHTML = `<div style="padding:40px;text-align:center;color:var(--red)">Failed to load show details.</div>`;
    return;
  }

  const backdrop = show.backdrop_path ? `<img class="detail-backdrop-img" src="${IMG_BASE}w1280${show.backdrop_path}" alt="">` : `<div class="detail-backdrop-placeholder"></div>`;
  const poster = show.poster_path ? `<img class="detail-poster" src="${IMG_BASE}w342${show.poster_path}" alt="${escHtml(show.name)}">` : `<div class="detail-poster" style="height:180px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:40px;border-radius:6px">📺</div>`;
  const year = (show.first_air_date || '').slice(0, 4);
  const score = show.vote_average ? show.vote_average.toFixed(1) : '';
  const status = show.status || '';
  const genres = (show.genres || []).map(g => `<span class="badge">${escHtml(g.name)}</span>`).join('');
  const numSeasons = show.number_of_seasons || 0;
  const numEps = show.number_of_episodes || 0;
  const isOnAir = status === 'Returning Series';

  // Filter out specials (season 0) for display but still keep in data
  const realSeasons = (show.seasons || []).filter(s => s.season_number > 0);

  currentDetailShow = {
    id: show.id,
    title: show.name,
    seasons: realSeasons,
    allSeasons: show.seasons || []
  };

  document.getElementById('detailContent').innerHTML = `
    ${backdrop}
    <div class="detail-grad"></div>
    <div class="detail-body">
      ${poster}
      <div class="detail-info">
        <div class="detail-title">${escHtml(show.name)}</div>
        <div class="detail-meta">
          ${year ? `<span class="badge">${year}</span>` : ''}
          ${numSeasons ? `<span class="badge">${numSeasons} season${numSeasons>1?'s':''}</span>` : ''}
          ${numEps ? `<span class="badge">${numEps} episodes</span>` : ''}
          ${score ? `<span class="badge rating">★ ${score}</span>` : ''}
          ${isOnAir ? `<span class="badge status-on">● On Air</span>` : (status ? `<span class="badge">${escHtml(status)}</span>` : '')}
          ${genres}
        </div>
        <div class="detail-overview">${escHtml(show.overview || 'No description available.')}</div>
      </div>
    </div>
  `;

  // Populate episode picker
  if (realSeasons.length) {
    const picker = document.getElementById('episodePicker');
    picker.style.display = 'block';
    const sel = document.getElementById('seasonSel');
    sel.innerHTML = '';
    realSeasons.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.season_number;
      opt.textContent = `Season ${s.season_number}`;
      sel.appendChild(opt);
    });
    sel.value = realSeasons[0].season_number;
    await loadSeason();
  }
}

async function loadSeason() {
  if (!currentDetailShow) return;
  const seasonNum = parseInt(document.getElementById('seasonSel').value);
  const grid = document.getElementById('epGrid');
  const statsEl = document.getElementById('seasonStats');
  grid.innerHTML = `<div class="ep-loading">Loading episodes…</div>`;
  statsEl.textContent = '';

  const data = await tmdb(`/tv/${currentDetailShow.id}/season/${seasonNum}`);
  const eps = data?.episodes || [];

  statsEl.textContent = `${eps.length} episode${eps.length !== 1 ? 's' : ''}`;

  if (!eps.length) {
    grid.innerHTML = `<div class="ep-loading" style="color:var(--muted)">No episodes found for this season.</div>`;
    return;
  }

  grid.innerHTML = eps.map(ep => `
    <button class="ep-card" onclick="openPlayerFromDetail(${ep.season_number}, ${ep.episode_number})">
      <div class="ep-num">${ep.episode_number}</div>
      <div class="ep-info">
        <div class="ep-title">${escHtml(ep.name || `Episode ${ep.episode_number}`)}</div>
        ${ep.air_date ? `<div class="ep-air">${ep.air_date}</div>` : ''}
      </div>
    </button>
  `).join('');
}

function openPlayerFromDetail(season, ep) {
  if (!currentDetailShow) return;
  closeDetail();
  openPlayerDirect(currentDetailShow.id, currentDetailShow.title, season, ep, currentDetailShow.seasons);
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('open');
}

function closeDetailIfBackdrop(e) {
  if (e.target === document.getElementById('detailModal')) closeDetail();
}

// ─── PLAYER ───────────────────────────────────────────────────────────────────
function openPlayerDirect(showId, title, season, ep, seasons) {
  playerShowId = showId;
  playerShowTitle = title;
  playerCurrentSeason = season;
  playerCurrentEp = ep;

  document.getElementById('playerTitle').textContent = `${title} — S${String(season).padStart(2,'0')}E${String(ep).padStart(2,'0')}`;
  document.getElementById('playerFrame').src = `https://vidsrcme.ru/embed/tv?tmdb=${showId}&season=${season}&episode=${ep}`;
  document.getElementById('playerOverlay').classList.add('open');

  // Populate in-player season/ep controls if we have seasons data
  if (seasons && seasons.length > 1) {
    const seasonSel = document.getElementById('playerSeasonSel');
    seasonSel.innerHTML = seasons.map(s => `<option value="${s.season_number}"${s.season_number===season?' selected':''}>S${s.season_number}</option>`).join('');
    // Populate episodes for this season
    const thisSeasonData = seasons.find(s => s.season_number === season);
    populatePlayerEps(seasons, season, ep);
    document.getElementById('playerEpControls').style.display = 'flex';
    // Store seasons on the select for later
    document.getElementById('playerSeasonSel')._seasons = seasons;
  } else {
    document.getElementById('playerEpControls').style.display = 'none';
  }
}

async function populatePlayerEps(seasons, season, currentEp) {
  const epSel = document.getElementById('playerEpSel');
  const seasonData = seasons.find(s => s.season_number === season);
  const epCount = seasonData?.episode_count || 0;
  if (!epCount) {
    // Fetch from TMDB
    const data = await tmdb(`/tv/${playerShowId}/season/${season}`);
    const eps = data?.episodes || [];
    epSel.innerHTML = eps.map(e => `<option value="${e.episode_number}"${e.episode_number===currentEp?' selected':''}>E${e.episode_number}: ${escHtml(e.name)}</option>`).join('');
  } else {
    epSel.innerHTML = Array.from({length: epCount}, (_,i) => i+1).map(n => `<option value="${n}"${n===currentEp?' selected':''}>E${n}</option>`).join('');
  }
}

function playerChangeSeason() {
  const seasonSel = document.getElementById('playerSeasonSel');
  const seasons = seasonSel._seasons;
  const season = parseInt(seasonSel.value);
  playerCurrentSeason = season;
  playerCurrentEp = 1;
  populatePlayerEps(seasons, season, 1);
  loadPlayerEp(1);
}

function playerChangeEp() {
  const ep = parseInt(document.getElementById('playerEpSel').value);
  loadPlayerEp(ep);
}

function loadPlayerEp(ep) {
  playerCurrentEp = ep;
  document.getElementById('playerFrame').src = `https://vidsrcme.ru/embed/tv?tmdb=${playerShowId}&season=${playerCurrentSeason}&episode=${ep}`;
  document.getElementById('playerTitle').textContent = `${playerShowTitle} — S${String(playerCurrentSeason).padStart(2,'0')}E${String(ep).padStart(2,'0')}`;
}

function closePlayer() {
  document.getElementById('playerOverlay').classList.remove('open');
  document.getElementById('playerFrame').src = '';
  document.getElementById('playerEpControls').style.display = 'none';
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function skeletonGrid(count) {
  return Array(count).fill(0).map(() => `
    <div class="section">
      <div class="section-head"><div class="skeleton" style="width:160px;height:18px"></div></div>
      <div class="show-grid">${Array(8).fill(0).map(() => `
        <div>
          <div class="skeleton" style="width:100%;aspect-ratio:2/3;border-radius:8px;"></div>
          <div class="skeleton" style="margin-top:8px;height:13px;width:80%;border-radius:4px;"></div>
          <div class="skeleton" style="margin-top:5px;height:11px;width:40%;border-radius:4px;"></div>
        </div>`).join('')}
      </div>
    </div>`).join('');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('playerOverlay').classList.contains('open')) closePlayer();
    else if (document.getElementById('detailModal').classList.contains('open')) closeDetail();
  }
});
</script>
</body>
</html>

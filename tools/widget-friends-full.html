<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Full Friends List Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/*
  EMBEDDABLE WIDGET: Full Friends List
  Shows all friends in a grid with online/offline status, like a Roblox-style friends page.
  Exposes: window.__jmgOpenChat(type, id, name) for navigation
*/
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #121215;
  --surface:  #191b1f;
  --surface2: #232527;
  --border:   #34373d;
  --accent:   #f2f4f5;
  --accent2:  #b8b8b8;
  --green:    #22d3a5;
  --red:      #f85a5a;
  --yellow:   #f5c842;
  --text:     #f2f4f5;
  --muted:    #b8b8b8;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }

#jmg-friends-full {
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  background: var(--bg);
  width: 100%;
}

html.popup-mode,
html.popup-mode body,
html.popup-mode #jmg-friends-full {
  height: 100%;
  overflow: hidden;
}

html.popup-mode #jmg-friends-full {
  display: flex;
  flex-direction: column;
  padding: 16px;
  box-sizing: border-box;
}

.fl-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 0 16px;
  flex-wrap: wrap;
}
.fl-toolbar h2 {
  font-size: 14px;
  color: var(--accent);
  flex: 1;
}
.fl-search {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  width: 200px;
  transition: border-color 0.15s;
}
.fl-search:focus { border-color: var(--accent); }
.fl-filter {
  display: flex;
  gap: 6px;
}
.fl-filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.fl-filter-btn.active { background: #f2f4f5; color: #191b1f; border-color: #f2f4f5; }
.fl-filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }

.fl-add-row {
  display: none;
  gap: 8px;
  padding: 0 0 14px;
}

.fl-add-row.is-visible {
  display: flex;
}

.fl-add-row input {
  flex: 1;
  min-width: 0;
  padding: 9px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
}

.fl-add-row input:focus { border-color: var(--accent); }

.fl-add-row button {
  border: 1px solid #f2f4f5;
  border-radius: 8px;
  background: #f2f4f5;
  color: #191b1f;
  cursor: pointer;
  font: inherit;
  font-size: 13px;
  font-weight: 700;
  padding: 0 14px;
}

.fl-message {
  min-height: 18px;
  margin: -8px 0 10px;
  color: var(--muted);
  font-size: 12px;
}

.fl-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
}

html.popup-mode .fl-grid {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding-right: 4px;
}

html.popup-mode .fl-grid::-webkit-scrollbar { width: 5px; }
html.popup-mode .fl-grid::-webkit-scrollbar-thumb { background: #4b4e57; border-radius: 3px; }

.fl-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
  isolation: isolate;
}
.fl-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: #232527;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
  z-index: 0;
}
.fl-card:hover { border-color: #5f626a; transform: translateY(-1px); }
.fl-card:hover::before { opacity: 1; }
.fl-card > * {
  position: relative;
  z-index: 1;
}
.fl-card-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700;
  color: var(--accent);
  flex-shrink: 0;
  position: relative;
  cursor: pointer;
  overflow: hidden;
}
.fl-card-avatar:hover { border-color: #d7d7d7; }
.fl-card-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.fl-card-avatar.group { border-radius: 10px; color: var(--accent2); }
.status-pip {
  position: absolute;
  bottom: 0; right: 0;
  width: 11px; height: 11px;
  border-radius: 50%;
  border: 2px solid var(--surface);
}
.status-pip.online  { background: var(--green); }
.status-pip.offline { background: var(--muted); }
.fl-card-info { flex: 1; min-width: 0; }
.fl-card-name {
  font-size: 13px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.fl-card-handle {
  font-size: 11px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 1px;
}
.fl-card-status {
  font-size: 10px; font-weight: 600;
  margin-top: 4px;
}
.fl-card-status.online { color: var(--green); }
.fl-card-status.offline { color: var(--muted); }
.fl-card-status.playing { color: var(--yellow); }
.fl-card-status.pending { color: var(--yellow); }
.fl-card-dm-btn {
  background: #232527;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--accent);
  font-size: 11px;
  font-family: 'DM Sans', sans-serif;
  padding: 4px 8px;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.fl-card-dm-btn:hover { background: #2b2d33; border-color: #5f626a; }
.fl-card-actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
  width: 84px;
}
.fl-card-dm-btn.danger:hover {
  border-color: var(--red);
  color: var(--red);
}
.fl-section-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0;
  text-transform: uppercase;
  color: var(--muted);
  grid-column: 1/-1;
  padding-top: 6px;
}
.fl-empty {
  grid-column: 1/-1;
  text-align: center;
  padding: 40px;
  color: var(--muted);
  font-size: 14px;
}
.fl-loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

html.row-mode,
html.row-mode body {
  background: transparent;
  overflow: hidden;
}
html.row-mode #jmg-friends-full {
  background: transparent;
}
html.row-mode .fl-toolbar {
  display: none;
}
html.row-mode .fl-add-row,
html.row-mode .fl-message {
  display: none !important;
}
html.row-mode .fl-grid {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 0 0 8px;
}
html.row-mode .fl-grid::-webkit-scrollbar {
  height: 4px;
}
html.row-mode .fl-grid::-webkit-scrollbar-thumb {
  background: #4b4e57;
  border-radius: 999px;
}
html.row-mode .fl-section-label {
  display: none;
}
html.row-mode .fl-card {
  width: 220px;
  min-width: 220px;
  min-height: 76px;
  padding: 14px;
  border-radius: 10px;
}
html.row-mode .fl-empty,
html.row-mode .fl-loading {
  width: 100%;
  min-width: 260px;
  padding: 24px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
}
</style>
</head>
<body>

<!-- WIDGET ROOT -->
<div id="jmg-friends-full">
  <div class="fl-toolbar">
    <h2>Friends</h2>
    <input class="fl-search" type="text" id="fl-search" placeholder="Search friends...">
    <div class="fl-filter">
      <button class="fl-filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
      <button class="fl-filter-btn" data-filter="online" onclick="setFilter('online',this)">Online</button>
    </div>
  </div>
  <div class="fl-add-row" id="fl-add-row">
    <input type="text" id="fl-add-input" placeholder="Add by username..." maxlength="20" autocomplete="off">
    <button type="button" id="fl-add-button">Add Friend</button>
  </div>
  <div class="fl-message" id="fl-message"></div>
  <div class="fl-grid" id="fl-grid">
    <div class="fl-loading">Loading friends...</div>
  </div>
</div>
<!-- END WIDGET ROOT -->

<script>
(function() {
  const BACKEND = 'https://justmathgames-backend.onrender.com';
  const token   = localStorage.getItem('jmg_token');
  const me      = localStorage.getItem('jmg_username');
  const params  = new URLSearchParams(window.location.search);
  const rowMode = params.get('mode') === 'row';
  const popupMode = params.get('mode') === 'popup';
  const includeRequests = params.get('requests') === '1' || popupMode;
  const focusMode = params.get('focus') || '';

  document.documentElement.classList.toggle('row-mode', rowMode);
  document.documentElement.classList.toggle('popup-mode', popupMode);
  document.getElementById('fl-add-row').classList.toggle('is-visible', includeRequests);

  let allFriends = [];
  let incomingRequests = [];
  let outgoingRequests = [];
  let currentFilter = 'all';
  let profileCache = {};

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escAttr(s) { return esc(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function initial(name) { return (name||'?')[0].toUpperCase(); }
  function localProfile(username) {
    if (username !== me) return null;
    return { username: me, pfp: localStorage.getItem('jmg_pfp') || '' };
  }
  async function fetchProfile(username) {
    if (!username) return { username, pfp: '' };
    if (profileCache[username]) return profileCache[username];
    const own = localProfile(username);
    if (own) {
      profileCache[username] = own;
      return own;
    }
    try {
      const r = await fetch(`${BACKEND}/profile/${encodeURIComponent(username)}`, {
        headers: token ? { Authorization:`Bearer ${token}` } : {}
      });
      if (r.ok) {
        const data = await r.json();
        profileCache[username] = { username, pfp: data.pfp || data.avatar || data.avatarUrl || '' };
        return profileCache[username];
      }
    } catch {}
    profileCache[username] = { username, pfp: '' };
    return profileCache[username];
  }
  function avatarHtml(username) {
    const profile = profileCache[username] || localProfile(username) || {};
    return profile.pfp ? `<img src="${escAttr(profile.pfp)}" alt="">` : initial(username);
  }
  function normalizeFriend(friend) {
    if (typeof friend === 'string') {
      const profile = profileCache[friend] || {};
      return {
        username: friend,
        online: profile.online === true,
        statusClass: profile.statusClass || (profile.online ? 'online' : 'offline'),
        statusText: profile.statusText || (profile.online ? 'Online' : 'Offline')
      };
    }

    const username = friend?.username || friend?.name || friend?.user || friend?.displayName || '';
    const rawStatus = String(friend?.status || friend?.presence || '').toLowerCase();
    const lastSeenTime = friend?.lastSeen ? Date.parse(friend.lastSeen) : 0;
    const recentlySeen = Number.isFinite(lastSeenTime) && Date.now() - lastSeenTime < 45 * 1000;
    const playing = rawStatus === 'playing' || Boolean(friend?.playing || friend?.activity);
    const online = playing || friend?.online === true || rawStatus === 'online' || rawStatus === 'active' || recentlySeen;

    return {
      username,
      online,
      statusClass: friend?.statusClass || (playing ? 'playing' : online ? 'online' : 'offline'),
      statusText: friend?.statusText || (playing ? (friend.activity || 'Playing') : online ? 'Online' : 'Offline')
    };
  }

  window.__jmgOpenWidgetChat = function(type, id, name) {
    if (window.__jmgOpenChat) window.__jmgOpenChat(type, id, name);
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({
        source: 'jmg-widget',
        action: 'openChat',
        type,
        id,
        name
      }, '*');
    }
  };

  window.__jmgOpenProfileWidget = function(username) {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({
        source: 'jmg-widget',
        action: 'openProfile',
        username
      }, '*');
    }
  };

  window.setFilter = function(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.fl-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  };

  document.getElementById('fl-search').addEventListener('input', renderGrid);

  function renderGrid() {
    const query = document.getElementById('fl-search').value.toLowerCase();
    const grid  = document.getElementById('fl-grid');
    let html    = '';

    if (!token || !me) {
      grid.innerHTML = '<div class="fl-empty">Log in to see friends</div>';
      return;
    }

    const filteredFriends = allFriends
      .filter(friend => friend.username.toLowerCase().includes(query))
      .filter(friend => currentFilter !== 'online' || friend.online);

    const filteredIncoming = incomingRequests.filter(username => username.toLowerCase().includes(query));
    const filteredOutgoing = outgoingRequests.filter(username => username.toLowerCase().includes(query));

    if (includeRequests && filteredIncoming.length) {
      html += `<div class="fl-section-label">Incoming Requests - ${filteredIncoming.length}</div>`;
      html += filteredIncoming.map(username => `
        <div class="fl-card">
          <div class="fl-card-avatar" onclick="event.stopPropagation();window.__jmgOpenProfileWidget('${esc(username)}')">
            ${avatarHtml(username)}
            <div class="status-pip ${normalizeFriend(username).statusClass}"></div>
          </div>
          <div class="fl-card-info">
            <div class="fl-card-name">${esc(username)}</div>
            <div class="fl-card-handle">@${esc(username)}</div>
            <div class="fl-card-status pending">Wants to be friends</div>
          </div>
          <div class="fl-card-actions">
            <button class="fl-card-dm-btn danger" onclick="event.stopPropagation();respondFriendRequest('${esc(username)}','decline')">Ignore</button>
            <button class="fl-card-dm-btn" onclick="event.stopPropagation();respondFriendRequest('${esc(username)}','accept')">Accept</button>
          </div>
        </div>
      `).join('');
    }

    if (includeRequests && filteredOutgoing.length) {
      html += `<div class="fl-section-label">Outgoing Requests - ${filteredOutgoing.length}</div>`;
      html += filteredOutgoing.map(username => `
        <div class="fl-card">
          <div class="fl-card-avatar" onclick="event.stopPropagation();window.__jmgOpenProfileWidget('${esc(username)}')">
            ${avatarHtml(username)}
            <div class="status-pip ${normalizeFriend(username).statusClass}"></div>
          </div>
          <div class="fl-card-info">
            <div class="fl-card-name">${esc(username)}</div>
            <div class="fl-card-handle">@${esc(username)}</div>
            <div class="fl-card-status pending">Request sent</div>
          </div>
          <button class="fl-card-dm-btn danger" onclick="event.stopPropagation();cancelFriendRequest('${esc(username)}')">Cancel</button>
        </div>
      `).join('');
    }

    if (filteredFriends.length) {
      html += `<div class="fl-section-label">Friends - ${filteredFriends.length}</div>`;
      html += filteredFriends.map(friend => `
        <div class="fl-card" onclick="window.__jmgOpenWidgetChat('dm','${esc(friend.username)}','${esc(friend.username)}')">
          <div class="fl-card-avatar" onclick="event.stopPropagation();window.__jmgOpenProfileWidget('${esc(friend.username)}')">
            ${avatarHtml(friend.username)}
            <div class="status-pip ${friend.statusClass}"></div>
          </div>
          <div class="fl-card-info">
            <div class="fl-card-name">${esc(friend.username)}</div>
            <div class="fl-card-handle">@${esc(friend.username)}</div>
            <div class="fl-card-status ${friend.statusClass}">${esc(friend.statusText)}</div>
          </div>
          <button class="fl-card-dm-btn" onclick="event.stopPropagation();window.__jmgOpenWidgetChat('dm','${esc(friend.username)}','${esc(friend.username)}')">DM</button>
        </div>
      `).join('');
    }

    if (!html) {
      html = `<div class="fl-empty">${currentFilter === 'online' ? 'No online friends' : 'No friends found'}</div>`;
    }

    grid.innerHTML = html;
  }

  async function load() {
    if (!token || !me) { renderGrid(); return; }
    try {
      const fr = await fetch(`${BACKEND}/friends`, { headers:{ Authorization:`Bearer ${token}` } });
      const fd = await fr.json();
      profileCache = { ...profileCache, ...(fd.profiles || {}) };
      incomingRequests = fd.incoming || [];
      outgoingRequests = fd.outgoing || [];
      allFriends = (fd.friends || []).map(username => normalizeFriend({
        username,
        ...(profileCache[username] || {})
      })).filter(friend => friend.username);
      await Promise.all([...allFriends.map(friend => friend.username), ...incomingRequests, ...outgoingRequests].map(fetchProfile));
      renderGrid();
    } catch {
      document.getElementById('fl-grid').innerHTML = '<div class="fl-empty">Could not load friends</div>';
    }
  }

  async function sendFriendRequest() {
    const input = document.getElementById('fl-add-input');
    const message = document.getElementById('fl-message');
    const to = input.value.trim();
    message.textContent = '';
    if (!to) return;
    if (!token) {
      message.textContent = 'Log in to add friends.';
      return;
    }

    try {
      const response = await fetch(`${BACKEND}/friends/request`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({ to })
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        message.textContent = data.error || 'Could not send request.';
        return;
      }
      input.value = '';
      message.textContent = `Request sent to ${to}.`;
      await load();
    } catch {
      message.textContent = 'Something went wrong.';
    }
  }

  window.respondFriendRequest = async function(username, action) {
    try {
      await fetch(`${BACKEND}/friends/respond`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({ from: username, action })
      });
      await load();
    } catch {}
  };

  window.cancelFriendRequest = async function(username) {
    try {
      await fetch(`${BACKEND}/friends/${encodeURIComponent(username)}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` }
      });
      await load();
    } catch {}
  };

  document.getElementById('fl-add-button').addEventListener('click', sendFriendRequest);
  document.getElementById('fl-add-input').addEventListener('keydown', event => {
    if (event.key === 'Enter') sendFriendRequest();
  });

  window.addEventListener('message', event => {
    if ((event.data || {}).action === 'refresh') load();
  });

  load();
  if (focusMode === 'add') setTimeout(() => document.getElementById('fl-add-input')?.focus(), 0);
  setInterval(load, 1000);
})();
</script>
</body>
</html>

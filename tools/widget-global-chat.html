<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Chat Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/*
  EMBEDDABLE WIDGET: Global Chat
  Public chat visible to everyone. Read-only for guests, post when logged in.
  No sidebar, no friend list — just the global channel.
*/
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #121215;
  --surface:  #191b1f;
  --surface2: #232527;
  --border:   #34373d;
  --accent:   #f2f4f5;
  --accent2:  #b8b8b8;
  --green:    #22d3a5;
  --red:      #f85a5a;
  --link:     #00a2ff;
  --text:     #f2f4f5;
  --muted:    #b8b8b8;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; }

#jmg-global-chat {
  display: flex;
  flex-direction: column;
  height: 100%;
  min-height: 400px;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
}
.gl-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.gl-globe {
  width: 34px; height: 34px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.gl-header-info { flex: 1; }
.gl-header-name {
  font-size: 14px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}
.gl-live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 5px var(--green);
  display: inline-block;
  animation: pulse-glow 2s infinite;
}
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 4px var(--green); }
  50%       { box-shadow: 0 0 10px var(--green); }
}
.gl-header-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; }
.gl-online-count {
  font-size: 12px;
  color: var(--green);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px 10px;
  font-weight: 500;
}

.gl-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 18px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.gl-messages::-webkit-scrollbar { width: 4px; }
.gl-messages::-webkit-scrollbar-thumb { background: #4b4e57; border-radius: 2px; }

.gl-day-sep {
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  padding: 6px 0;
  position: relative;
}
.gl-day-sep::before, .gl-day-sep::after {
  content: '';
  position: absolute;
  top: 50%; width: calc(50% - 44px);
  height: 1px; background: var(--border);
}
.gl-day-sep::before { left: 0; }
.gl-day-sep::after  { right: 0; }

.gl-msg {
  display: flex;
  gap: 9px;
  padding: 4px 6px;
  border-radius: 8px;
  max-width: 640px;
  transition: background 0.1s;
}
.gl-msg:hover { background: rgba(255,255,255,0.025); }
.gl-msg.own { align-self: flex-end; flex-direction: row-reverse; }
.gl-msg-av {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  color: var(--accent);
  font-family: 'Space Mono', monospace;
  flex-shrink: 0; margin-top: 2px;
  overflow: hidden;
}
.gl-msg-av img { width: 100%; height: 100%; object-fit: cover; display: block; }
.gl-msg.own .gl-msg-av { color: var(--accent2); }
.gl-msg-body { min-width: 0; }
.gl-msg-meta {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 2px;
}
.gl-msg.own .gl-msg-meta { flex-direction: row-reverse; }
.gl-msg-author { font-size: 12px; font-weight: 600; color: var(--accent); }
.gl-msg.own .gl-msg-author { color: var(--accent2); }
.gl-msg-time { font-size: 10px; color: var(--muted); }
.gl-msg-text { font-size: 13px; line-height: 1.55; word-break: break-word; }
.gl-del-btn {
  opacity: 0;
  background: none; border: none;
  color: var(--red); cursor: pointer;
  font-size: 9px; padding: 0 4px;
  transition: opacity 0.15s;
  align-self: flex-start; margin-top: 5px;
}
.gl-msg:hover .gl-del-btn { opacity: 1; }

.gl-input-bar {
  padding: 10px 18px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
}
.gl-input-bar textarea {
  flex: 1;
  padding: 9px 13px;
  border-radius: 9px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  resize: none;
  outline: none;
  max-height: 100px;
  line-height: 1.5;
  transition: border-color 0.15s;
}
.gl-input-bar textarea:focus { border-color: var(--accent); }
.gl-send-btn {
  padding: 9px 18px;
  border-radius: 8px;
  border: none;
  background: #f2f4f5;
  color: #191b1f;
  font-weight: 600;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: opacity 0.15s;
  flex-shrink: 0;
}
.gl-send-btn:hover { opacity: 0.88; }
.gl-send-btn:disabled { opacity: 0.35; cursor: default; }

.gl-guest-bar {
  padding: 10px 18px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  flex-shrink: 0;
}
.gl-guest-bar a {
  color: var(--link);
  text-decoration: underline;
  cursor: pointer;
}

.gl-empty { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; }

/* Scroll-to-bottom fab */
.gl-scroll-fab {
  position: absolute;
  bottom: 80px; right: 24px;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--accent);
  font-size: 16px;
  cursor: pointer;
  display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  transition: all 0.15s;
  z-index: 5;
}
.gl-scroll-fab:hover { border-color: var(--accent); }
.gl-scroll-fab.visible { display: flex; }
</style>
</head>
<body>
<div style="position:relative; height:100vh;">
<!-- WIDGET ROOT -->
<div id="jmg-global-chat">
  <div class="gl-header">
    <div class="gl-globe">🌐</div>
    <div class="gl-header-info">
      <div class="gl-header-name">
        Global Chat
        <span class="gl-live-dot"></span>
      </div>
      <div class="gl-header-sub">Public · Everyone can see this</div>
    </div>
    <div class="gl-online-count" id="gl-online">Live</div>
  </div>

  <div class="gl-messages" id="gl-messages"></div>

  <!-- Logged in: input bar -->
  <div class="gl-input-bar" id="gl-input-bar" style="display:none;">
    <textarea id="gl-input" rows="1" placeholder="Message everyone..." maxlength="500"></textarea>
    <button class="gl-send-btn" id="gl-send">Send</button>
  </div>

  <!-- Guest: prompt to log in -->
  <div class="gl-guest-bar" id="gl-guest-bar" style="display:none;">
    <a onclick="window.__jmgShowAuth && window.__jmgShowAuth()">Sign up or log in</a> to join the conversation
  </div>
</div>

<button class="gl-scroll-fab" id="gl-scroll-fab" onclick="scrollToBottom()" title="Jump to latest">↓</button>
<!-- END WIDGET ROOT -->
</div>

<script>
(function() {
  const BACKEND = 'https://justmathgames-backend.onrender.com';
  let token = localStorage.getItem('jmg_token');
  let me    = localStorage.getItem('jmg_username');
  let profileCache = {};

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escAttr(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function initial(n) { return (n||'?')[0].toUpperCase(); }
  function fmtTime(ds) { return new Date(ds).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
  function fmtDate(ds) { return new Date(ds).toLocaleDateString([],{month:'short',day:'numeric'}); }
  function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

  function readAuthState() {
    token = localStorage.getItem('jmg_token');
    me = localStorage.getItem('jmg_username');
  }

  function localProfile(username) {
    if (username !== me) return null;
    return {
      username: me,
      pfp: localStorage.getItem('jmg_pfp') || ''
    };
  }

  async function fetchProfile(username) {
    if (!username) return { username, pfp: '' };
    if (profileCache[username]) return profileCache[username];

    const own = localProfile(username);
    if (own) {
      profileCache[username] = own;
      return own;
    }

    try {
      const r = await fetch(`${BACKEND}/profile/${encodeURIComponent(username)}`, {
        headers: token ? { Authorization:`Bearer ${token}` } : {}
      });
      if (r.ok) {
        const data = await r.json();
        profileCache[username] = {
          username,
          pfp: data.pfp || data.avatar || data.avatarUrl || ''
        };
        return profileCache[username];
      }
    } catch {}

    profileCache[username] = { username, pfp: '' };
    return profileCache[username];
  }

  function avatarHtml(username) {
    const profile = profileCache[username] || localProfile(username) || {};
    return profile.pfp
      ? `<img src="${escAttr(profile.pfp)}" alt="">`
      : initial(username);
  }

  function syncAuthUi() {
    readAuthState();
    if (me && token) {
      document.getElementById('gl-input-bar').style.display  = 'flex';
      document.getElementById('gl-guest-bar').style.display  = 'none';
    } else {
      document.getElementById('gl-input-bar').style.display  = 'none';
      document.getElementById('gl-guest-bar').style.display  = 'block';
    }
  }

  window.scrollToBottom = function() {
    const c = document.getElementById('gl-messages');
    c.scrollTop = c.scrollHeight;
  };

  window.__jmgShowAuth = function() {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({
        source: 'jmg-widget',
        action: 'showLogin'
      }, '*');
      return;
    }

    window.location.href = 'chat.html?auth=login';
  };

  syncAuthUi();

  // Scroll fab
  document.getElementById('gl-messages').addEventListener('scroll', function() {
    const fab = document.getElementById('gl-scroll-fab');
    const far = this.scrollHeight - this.scrollTop - this.clientHeight > 120;
    fab.classList.toggle('visible', far);
  });

  async function loadMessages() {
    try {
      const headers = {};
      if (token) headers.Authorization = `Bearer ${token}`;
      const r    = await fetch(`${BACKEND}/chat`, { headers });
      if (!r.ok) return;
      const msgs = await r.json();
      const senders = [...new Set(msgs.map(msg => msg.username || msg.from).filter(Boolean))];
      await Promise.all(
        senders
          .filter(s => !profileCache[s])  // ← only fetch uncached profiles
          .map(fetchProfile)
      );
      renderMessages(msgs);
    } catch {}
  }

  function renderMessages(msgs) {
    const container = document.getElementById('gl-messages');
    const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;

    if (!msgs.length) {
      container.innerHTML = '<div class="gl-empty">No messages yet. Be the first to say something!</div>';
      return;
    }

    let html = '', lastDate = '';
    msgs.forEach(msg => {
      const sender = msg.username || msg.from;
      const own    = sender === me;
      const date   = fmtDate(msg.createdAt);
      if (date !== lastDate) { html += `<div class="gl-day-sep">${date}</div>`; lastDate = date; }
      const delBtn = own ? `<button class="gl-del-btn" onclick="deleteMsg('${msg._id}',this)">✕</button>` : '';
      html += `
        <div class="gl-msg ${own?'own':''}" data-id="${msg._id}">
          <div class="gl-msg-av">${avatarHtml(sender)}</div>
          <div class="gl-msg-body">
            <div class="gl-msg-meta">
              <span class="gl-msg-author">${esc(sender)}</span>
              <span class="gl-msg-time">${fmtTime(msg.createdAt)}</span>
            </div>
            <div class="gl-msg-text">${esc(msg.text)}</div>
          </div>
          ${delBtn}
        </div>`;
    });

    container.innerHTML = html;
    if (wasAtBottom) container.scrollTop = container.scrollHeight;
  }

  window.deleteMsg = async function(id, btn) {
    if (!confirm('Delete this message?')) return;
    try {
      await fetch(`${BACKEND}/chat/${id}`, { method:'DELETE', headers:{Authorization:`Bearer ${token}`} });
      btn.closest('.gl-msg').remove();
    } catch { alert('Could not delete'); }
  };

  async function sendMessage() {
    const input = document.getElementById('gl-input');
    const text  = input.value.trim();
    if (!text || !token) return;
    const btn = document.getElementById('gl-send');
    btn.disabled = true; input.value = ''; input.style.height = 'auto';
    try {
      const r = await fetch(`${BACKEND}/chat`, {
        method:'POST', headers:{'Content-Type':'application/json', Authorization:`Bearer ${token}`},
        body: JSON.stringify({text})
      });
      if (!r.ok) { const d=await r.json(); alert(d.error); return; }
      await loadMessages();
      document.getElementById('gl-messages').scrollTop = 99999;
    } catch { alert('Failed to send'); }
    finally { btn.disabled=false; input.focus(); }
  }

  document.getElementById('gl-send').onclick = sendMessage;
  document.getElementById('gl-input').addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('gl-input').addEventListener('input', function() { autoResize(this); });

  function refreshAuthAndMessages() {
    profileCache = {};
    syncAuthUi();
    loadMessages();
  }

  window.addEventListener('storage', event => {
    if (['jmg_token','jmg_username','jmg_profile_username','jmg_bio','jmg_pfp'].includes(event.key)) {
      refreshAuthAndMessages();
    }
  });

  window.addEventListener('message', event => {
    const data = event.data || {};
    if (data.action === 'authChanged') refreshAuthAndMessages();
  });

  // Update "live" count (rough approximation from recent senders)
  async function updateLiveCount() {
    try {
      const r    = await fetch(`${BACKEND}/chat`);
      const msgs = await r.json();
      if (!Array.isArray(msgs)) return;
      const recent = msgs.filter(m => Date.now() - new Date(m.createdAt) < 300000);
      const unique = new Set(recent.map(m => m.username || m.from)).size;
      document.getElementById('gl-online').textContent = unique > 0 ? `${unique} active` : 'Live';
    } catch {}
  }

  loadMessages();
  updateLiveCount();
  setInterval(loadMessages, 1000);
  setInterval(updateLiveCount, 30000);
})();
</script>
</body>
</html>

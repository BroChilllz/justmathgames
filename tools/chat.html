<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat – JustMathGames</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0b0f1a; color: #e6e6ff; display: flex; flex-direction: column; height: 100vh; }

    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px; flex-shrink: 0;
      background: linear-gradient(90deg, #3b3bff, #7a2cff);
      box-shadow: 0 4px 20px rgba(122,44,255,0.3);
    }
    .topbar .logo { font-size: 20px; font-weight: bold; color: white; }
    .topbar a { color: white; text-decoration: none; font-size: 13px; background: rgba(255,255,255,0.15); padding: 6px 12px; border-radius: 8px; }
    .topbar .user-info { font-size: 13px; color: rgba(255,255,255,0.85); display: flex; align-items: center; gap: 10px; }
    .topbar .user-info button { background: rgba(255,255,255,0.15); border: none; color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }

    /* AUTH MODAL */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 999;
    }
    .modal-bg.hidden { display: none; }
    .modal {
      background: #131829; border: 1px solid rgba(122,44,255,0.35);
      border-radius: 16px; padding: 30px; width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal h2 { font-size: 20px; margin-bottom: 20px; color: #a78bfa; }
    .modal input {
      width: 100%; padding: 10px 12px; border-radius: 8px;
      border: 1px solid rgba(122,44,255,0.3); background: rgba(255,255,255,0.05);
      color: #e6e6ff; font-size: 14px; margin-bottom: 12px; outline: none;
    }
    .modal input:focus { border-color: rgba(122,44,255,0.7); }
    .modal button.primary {
      width: 100%; padding: 10px; border-radius: 8px; border: none;
      background: linear-gradient(90deg, #3b3bff, #7a2cff);
      color: white; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 10px;
    }
    .modal button.primary:hover { opacity: 0.9; }
    .modal .switch { text-align: center; font-size: 13px; opacity: 0.7; cursor: pointer; }
    .modal .switch span { color: #a78bfa; text-decoration: underline; cursor: pointer; }
    .modal .error { color: #f87171; font-size: 13px; margin-bottom: 10px; min-height: 18px; }
    .modal .hint { font-size: 11px; opacity: 0.5; margin-top: -8px; margin-bottom: 12px; }
    .availability { font-size: 11px; margin-top: -8px; margin-bottom: 12px; min-height: 16px; }
    .availability.ok  { color: #4ade80; }
    .availability.bad { color: #f87171; }

    /* CHAT AREA */
    .chat-wrap { display: flex; flex-direction: column; flex: 1; overflow: hidden; max-width: 800px; width: 100%; margin: 0 auto; padding: 0 0 0 0; }
    .messages {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(122,44,255,0.3); border-radius: 3px; }

    .msg {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(122,44,255,0.15);
      border-radius: 10px; padding: 10px 14px; max-width: 75%; word-break: break-word;
    }
    .msg.own { align-self: flex-end; border-color: rgba(122,44,255,0.4); background: rgba(122,44,255,0.1); }
    .msg .meta { font-size: 11px; opacity: 0.5; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .msg .meta .name { color: #a78bfa; font-weight: bold; opacity: 1; }
    .msg .text { font-size: 14px; line-height: 1.5; }
    .msg .delete-btn { background: none; border: none; color: #f87171; cursor: pointer; font-size: 11px; opacity: 0.6; padding: 0; }
    .msg .delete-btn:hover { opacity: 1; }

    .input-bar {
      display: flex; gap: 10px; padding: 14px 20px;
      background: #0f1426; border-top: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
    }
    .input-bar input {
      flex: 1; padding: 10px 14px; border-radius: 10px;
      border: 1px solid rgba(122,44,255,0.3); background: rgba(255,255,255,0.05);
      color: #e6e6ff; font-size: 14px; outline: none;
    }
    .input-bar input:focus { border-color: rgba(122,44,255,0.7); }
    .input-bar button {
      padding: 10px 18px; border-radius: 10px; border: none;
      background: linear-gradient(90deg, #3b3bff, #7a2cff);
      color: white; font-weight: bold; cursor: pointer; font-size: 14px;
    }
    .input-bar button:hover { opacity: 0.9; }
    .input-bar button:disabled { opacity: 0.4; cursor: default; }

    .login-prompt {
      text-align: center; padding: 16px; font-size: 14px; opacity: 0.6;
      background: #0f1426; border-top: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
    }
    .login-prompt span { color: #a78bfa; cursor: pointer; text-decoration: underline; }

    .system-msg { text-align: center; font-size: 12px; opacity: 0.4; padding: 4px 0; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">JustMathGames – Chat</div>
  <div class="user-info" id="userInfo">
    <a href="index.html">⬅ Back</a>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">Sign Up</h2>
    <div class="error" id="authError"></div>
    <input type="text" id="authUsername" placeholder="Username" maxlength="20" autocomplete="off" />
    <div class="availability" id="usernameAvailability"></div>
    <input type="password" id="authPassword" placeholder="Password" autocomplete="off" />
    <div class="hint" id="passwordHint">At least 6 characters</div>
    <button class="primary" id="authSubmit">Sign Up</button>
    <div class="switch" id="authSwitch">Already have an account? <span onclick="switchMode()">Log in</span></div>
  </div>
</div>

<!-- CHAT -->
<div class="chat-wrap">
  <div class="messages" id="messages">
    <div class="system-msg">Loading messages...</div>
  </div>
  <div class="input-bar" id="inputBar" style="display:none;">
    <input type="text" id="msgInput" placeholder="Say something..." maxlength="500" />
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
  <div class="login-prompt" id="loginPrompt">
    <span onclick="showModal()">Sign up or log in</span> to chat
  </div>
</div>

<script>
  const BACKEND = 'https://justmathgames-backend.onrender.com'; // your Render URL

  let token = localStorage.getItem('jmg_token') || null;
  let currentUsername = localStorage.getItem('jmg_username') || null;
  let isLoginMode = false;
  let checkTimeout = null;

  // ================================================================
  // AUTH UI
  // ================================================================

  function showModal() {
    document.getElementById('modalBg').classList.remove('hidden');
    document.getElementById('authUsername').focus();
  }

  function hideModal() {
    document.getElementById('modalBg').classList.add('hidden');
    document.getElementById('authError').textContent = '';
  }

  function switchMode() {
    isLoginMode = !isLoginMode;
    document.getElementById('modalTitle').textContent = isLoginMode ? 'Log In' : 'Sign Up';
    document.getElementById('authSubmit').textContent = isLoginMode ? 'Log In' : 'Sign Up';
    document.getElementById('authSwitch').innerHTML = isLoginMode
      ? 'No account? <span onclick="switchMode()">Sign up</span>'
      : 'Already have an account? <span onclick="switchMode()">Log in</span>';
    document.getElementById('passwordHint').style.display = isLoginMode ? 'none' : 'block';
    document.getElementById('usernameAvailability').textContent = '';
    document.getElementById('authError').textContent = '';
  }

  // Live username availability check
  document.getElementById('authUsername').addEventListener('input', () => {
    if (isLoginMode) return;
    const val = document.getElementById('authUsername').value.trim();
    const el = document.getElementById('usernameAvailability');
    clearTimeout(checkTimeout);
    if (val.length < 3) { el.textContent = ''; return; }
    if (!/^[a-zA-Z0-9_]+$/.test(val)) {
      el.className = 'availability bad';
      el.textContent = 'Letters, numbers, underscores only';
      return;
    }
    el.textContent = 'Checking...';
    el.className = 'availability';
    checkTimeout = setTimeout(async () => {
      const res = await fetch(`${BACKEND}/auth/check/${val}`);
      const data = await res.json();
      el.className = 'availability ' + (data.available ? 'ok' : 'bad');
      el.textContent = data.available ? '✓ Available' : '✗ Already taken';
    }, 400);
  });

  document.getElementById('authSubmit').addEventListener('click', async () => {
    const username = document.getElementById('authUsername').value.trim();
    const password = document.getElementById('authPassword').value;
    const errEl = document.getElementById('authError');
    errEl.textContent = '';

    const endpoint = isLoginMode ? '/auth/login' : '/auth/register';
    const body = isLoginMode
      ? { username, password }
      : { username, password, userId: getUserId() };

    try {
      const res = await fetch(BACKEND + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error; return; }

      token = data.token;
      currentUsername = data.username;
      localStorage.setItem('jmg_token', token);
      localStorage.setItem('jmg_username', currentUsername);
      hideModal();
      updateAuthUI();
      loadMessages();
    } catch {
      errEl.textContent = 'Something went wrong, try again';
    }
  });

  // Submit on Enter
  document.getElementById('authPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('authSubmit').click();
  });

  function logout() {
    token = null;
    currentUsername = null;
    localStorage.removeItem('jmg_token');
    localStorage.removeItem('jmg_username');
    updateAuthUI();
  }

  function updateAuthUI() {
    const userInfo = document.getElementById('userInfo');
    const inputBar = document.getElementById('inputBar');
    const loginPrompt = document.getElementById('loginPrompt');

    if (currentUsername) {
      userInfo.innerHTML = `
        <a href="index.html">⬅ Back</a>
        <span>Logged in as <b>${currentUsername}</b></span>
        <button onclick="logout()">Log out</button>
      `;
      inputBar.style.display = 'flex';
      loginPrompt.style.display = 'none';
      document.getElementById('modalBg').classList.add('hidden');
    } else {
      userInfo.innerHTML = `<a href="index.html">⬅ Back</a>`;
      inputBar.style.display = 'none';
      loginPrompt.style.display = 'block';
    }
  }

  // ================================================================
  // CHAT
  // ================================================================

  function getUserId() {
    let id = localStorage.getItem('jmg_uid');
    if (!id) {
      id = 'user_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('jmg_uid', id);
    }
    return id;
  }

  function formatTime(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function renderMessage(msg) {
    const div = document.createElement('div');
    div.className = 'msg' + (msg.username === currentUsername ? ' own' : '');
    div.dataset.id = msg._id;

    const deleteBtn = msg.username === currentUsername
      ? `<button class="delete-btn" onclick="deleteMessage('${msg._id}', this)">✕ delete</button>`
      : '';

    div.innerHTML = `
      <div class="meta">
        <span class="name">${msg.username}</span>
        <span>${formatTime(msg.createdAt)} ${deleteBtn}</span>
      </div>
      <div class="text">${escapeHtml(msg.text)}</div>
    `;
    return div;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function loadMessages() {
    try {
      const res = await fetch(`${BACKEND}/chat`);
      const messages = await res.json();
      const container = document.getElementById('messages');
      container.innerHTML = '';
      if (messages.length === 0) {
        container.innerHTML = '<div class="system-msg">No messages yet. Be the first!</div>';
        return;
      }
      messages.forEach(msg => container.appendChild(renderMessage(msg)));
      container.scrollTop = container.scrollHeight;
    } catch {
      document.getElementById('messages').innerHTML =
        '<div class="system-msg">Could not load messages.</div>';
    }
  }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || !token) return;

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    input.value = '';

    try {
      const res = await fetch(`${BACKEND}/chat`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ text })
      });
      const msg = await res.json();
      if (!res.ok) { alert(msg.error); return; }

      const container = document.getElementById('messages');
      // Remove "no messages" placeholder if present
      const placeholder = container.querySelector('.system-msg');
      if (placeholder) placeholder.remove();

      container.appendChild(renderMessage(msg));
      container.scrollTop = container.scrollHeight;
    } catch {
      alert('Failed to send message');
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  async function deleteMessage(id, btn) {
    if (!confirm('Delete this message?')) return;
    try {
      await fetch(`${BACKEND}/chat/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      btn.closest('.msg').remove();
    } catch {
      alert('Could not delete message');
    }
  }

  // Send on Enter
  document.getElementById('msgInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });

  // Poll for new messages every 5 seconds
  setInterval(loadMessages, 5000);

  // ================================================================
  // INIT
  // ================================================================
  updateAuthUI();
  loadMessages();

  // If already logged in, skip modal. If not, show it automatically.
  if (!currentUsername) {
    // Don't auto-show — let them read chat first, they can click the prompt
  }
</script>
</body>
</html>

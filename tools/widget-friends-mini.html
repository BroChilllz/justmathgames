<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Friends List Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/*
  EMBEDDABLE WIDGET: Mini Friends List
  Drop this entire file into an iframe or paste the <style>+<div>+<script> blocks into your page.
  Requires: BACKEND constant pointing to your JustMathGames backend.
*/
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #121215;
  --surface:  #191b1f;
  --surface2: #232527;
  --border:   #34373d;
  --accent:   #f2f4f5;
  --accent2:  #b8b8b8;
  --green:    #22d3a5;
  --red:      #f85a5a;
  --text:     #f2f4f5;
  --muted:    #b8b8b8;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }

#jmg-mini-friends {
  width: 260px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-family: 'DM Sans', sans-serif;
}
.mf-header {
  padding: 11px 14px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.mf-header:hover { background: var(--surface2); }
.mf-header .online-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  display: inline-block;
  margin-right: 6px;
}
.mf-list { overflow-y: auto; max-height: 340px; }
.mf-list::-webkit-scrollbar { width: 3px; }
.mf-list::-webkit-scrollbar-thumb { background: #4b4e57; border-radius: 2px; }
.mf-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  cursor: pointer;
  transition: background 0.12s;
  border-bottom: 1px solid #272930;
}
.mf-item:last-child { border-bottom: none; }
.mf-item:hover { background: var(--surface2); }
.mf-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  color: var(--accent);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.mf-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.mf-avatar.group { border-radius: 8px; color: var(--accent2); }
.mf-avatar .online-pip {
  position: absolute;
  bottom: -1px; right: -1px;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--green);
  border: 2px solid var(--surface);
}
.mf-avatar .online-pip.offline {
  background: var(--muted);
  box-shadow: none;
}
.mf-avatar .online-pip.playing {
  background: #f5c842;
}
.mf-info { flex: 1; min-width: 0; }
.mf-item .mf-info { cursor: pointer; }
.mf-name {
  font-size: 13px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.mf-last {
  font-size: 11px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 1px;
}
.mf-last.unread { color: var(--text); font-weight: 500; }
.mf-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
.mf-time { font-size: 10px; color: var(--muted); }
.mf-badge {
  background: var(--red);
  color: white;
  border-radius: 99px;
  font-size: 9px; font-weight: 700;
  padding: 1px 5px;
  min-width: 16px; text-align: center;
}
.mf-empty {
  padding: 24px 14px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}
.mf-footer {
  border-top: 1px solid var(--border);
  padding: 8px 14px;
}
.mf-footer-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}
.mf-see-all {
  width: 100%;
  background: none;
  border: 1px dashed var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  padding: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.mf-see-all:hover { border-color: var(--accent); color: var(--accent); background: var(--surface2); }
</style>
</head>
<body>

<!-- WIDGET ROOT — copy from here -->
<div id="jmg-mini-friends">
  <div class="mf-header" id="mf-header">
    <span><span class="online-dot"></span>Chats</span>
    <span id="mf-count" style="font-size:10px;"></span>
  </div>
  <div class="mf-list" id="mf-list">
    <div class="mf-empty">Loading...</div>
  </div>
  <div class="mf-footer">
    <div class="mf-footer-actions">
      <button class="mf-see-all" id="mf-create-gc-btn">Create GC</button>
      <button class="mf-see-all" id="mf-see-all-btn">See all friends -></button>
    </div>
  </div>
</div>
<!-- END WIDGET ROOT -->

<script>
(function() {
  const BACKEND = 'https://justmathgames-backend.onrender.com';
  const token   = localStorage.getItem('jmg_token');
  const me      = localStorage.getItem('jmg_username');
  let profileCache = {};

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function escAttr(s) { return esc(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function initial(name) { return (name||'?')[0].toUpperCase(); }
  function localProfile(username) {
    if (username !== me) return null;
    return { username: me, pfp: localStorage.getItem('jmg_pfp') || '' };
  }
  async function fetchProfile(username) {
    if (!username) return { username, pfp: '' };
    if (profileCache[username]) return profileCache[username];
    const own = localProfile(username);
    if (own) {
      profileCache[username] = own;
      return own;
    }
    try {
      const r = await fetch(`${BACKEND}/profile/${encodeURIComponent(username)}`, {
        headers: token ? { Authorization:`Bearer ${token}` } : {}
      });
      if (r.ok) {
        const data = await r.json();
        profileCache[username] = { username, pfp: data.pfp || data.avatar || data.avatarUrl || '' };
        return profileCache[username];
      }
    } catch {}
    profileCache[username] = { username, pfp: '' };
    return profileCache[username];
  }
  function avatarHtml(username) {
    const profile = profileCache[username] || localProfile(username) || {};
    return profile.pfp ? `<img src="${escAttr(profile.pfp)}" alt="">` : initial(username);
  }
  function profileStatus(username) {
    const profile = profileCache[username] || {};
    return {
      online: profile.online === true,
      statusClass: profile.statusClass || (profile.online ? 'online' : 'offline'),
      statusText: profile.statusText || (profile.online ? 'Online' : 'Offline')
    };
  }
  function relTime(ds) {
    const diff = Date.now() - new Date(ds).getTime();
    if (diff < 60000) return 'now';
    if (diff < 3600000) return Math.floor(diff/60000)+'m';
    if (diff < 86400000) return Math.floor(diff/3600000)+'h';
    return new Date(ds).toLocaleDateString([],{month:'short',day:'numeric'});
  }

  window.__jmgOpenWidgetChat = function(type, id, name) {
    if (window.__jmgOpenChat) window.__jmgOpenChat(type, id, name);
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({
        source: 'jmg-widget',
        action: 'openChat',
        type,
        id,
        name
      }, '*');
    }
  };

  window.__jmgOpenFriendsListWidget = function() {
    if (window.__jmgOpenFriendsList) window.__jmgOpenFriendsList();
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({
        source: 'jmg-widget',
        action: 'openFriendsList'
      }, '*');
    }
  };

  window.__jmgOpenCreateGroupWidget = function() {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({
        source: 'jmg-widget',
        action: 'openCreateGroup'
      }, '*');
    }
  };

  window.__jmgToggleMiniFriends = function() {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({
        source: 'jmg-widget',
        action: 'toggleMiniFriends'
      }, '*');
    }
  };

  window.__jmgOpenProfileWidget = function(username) {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({
        source: 'jmg-widget',
        action: 'openProfile',
        username
      }, '*');
    }
  };

  // Fetch last DM message for a user
  async function fetchLastGlobalMsg() {
    try {
      const r = await fetch(`${BACKEND}/chat`);
      const msgs = await r.json();
      return Array.isArray(msgs) && msgs.length ? msgs[msgs.length-1] : null;
    } catch { return null; }
  }

  // Fetch last DM message for a user
  async function fetchLastDm(user) {
    try {
      const r = await fetch(`${BACKEND}/dm/${user}`, { headers:{ Authorization:`Bearer ${token}` } });
      const msgs = await r.json();
      return Array.isArray(msgs) && msgs.length ? msgs[msgs.length-1] : null;
    } catch { return null; }
  }

  // Fetch last group message
  async function fetchLastGroupMsg(groupId) {
    try {
      const r = await fetch(`${BACKEND}/groups/${groupId}/messages`, { headers:{ Authorization:`Bearer ${token}` } });
      const msgs = await r.json();
      return Array.isArray(msgs) && msgs.length ? msgs[msgs.length-1] : null;
    } catch { return null; }
  }

  async function render() {
    const list  = document.getElementById('mf-list');
    const count = document.getElementById('mf-count');
  
    try {
      let data;
      if (token && me) {
        const r = await fetch(`${BACKEND}/social/summary`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        data = await r.json();
      } else {
        // Guests: just fetch global chat last message
        const r = await fetch(`${BACKEND}/chat`);
        const msgs = await r.json();
        data = { friends: [], groups: [], incoming: [], outgoing: [],
                 profiles: {}, dmLastMessages: {}, groupLastMessages: {},
                 globalLastMessage: msgs.length ? msgs[msgs.length - 1] : null };
      }
  
      profileCache = { ...profileCache, ...(data.profiles || {}) };
  
      const items = [];
  
      // Global chat
      const gm = data.globalLastMessage;
      items.push({
        type: 'global', id: 'global', name: 'Global Chat',
        lastText: gm ? `${gm.username || gm.from || 'Someone'}: ${gm.text}` : 'Everyone can chat here',
        lastTime: gm ? gm.createdAt : null, unread: false
      });
  
      // Friends (DMs)
      for (const u of (data.friends || []).slice(0, 8)) {
        const msg = data.dmLastMessages[u];
        items.push({
          type: 'dm', id: u, name: u,
          lastText: msg ? (msg.from === me ? 'You: ' : '') + msg.text : profileStatus(u).statusText,
          lastTime: msg ? msg.createdAt : null, unread: false,
          statusClass: profileStatus(u).statusClass,
          online: profileStatus(u).online
        });
      }
  
      // Groups
      for (const g of (data.groups || [])) {
        const msg = data.groupLastMessages[String(g._id)];
        const sender = msg ? (msg.username || msg.from || 'Someone') : '';
        items.push({
          type: 'group', id: g._id, name: g.name,
          lastText: msg ? (sender === me ? 'You: ' : sender + ': ') + msg.text : 'No messages yet',
          lastTime: msg ? msg.createdAt : null, unread: false, members: g.members.length
        });
      }
  
      items.sort((a, b) => {
        if (!a.lastTime && !b.lastTime) return 0;
        if (!a.lastTime) return 1;
        if (!b.lastTime) return -1;
        return new Date(b.lastTime) - new Date(a.lastTime);
      });
  
      count.textContent = `${items.length}`;
      list.innerHTML = items.length ? items.map(renderItem).join('') : '<div class="mf-empty">No friends yet</div>';
    } catch {
      list.innerHTML = '<div class="mf-empty">Could not load</div>';
    }
  }

  function renderItem(item) {
    return `
      <div class="mf-item" onclick="window.__jmgOpenWidgetChat('${item.type}','${esc(item.id)}','${esc(item.name)}')">
        <div class="mf-avatar ${item.type==='group' || item.type==='global'?'group':''}" ${item.type==='dm'?`onclick="event.stopPropagation();window.__jmgOpenProfileWidget('${esc(item.name)}')"`:''}>
          ${item.type === 'global' ? '&#127760;' : item.type === 'dm' ? avatarHtml(item.name) : initial(item.name)}
          ${item.type === 'dm' ? `<span class="online-pip ${esc(item.statusClass || 'offline')}"></span>` : ''}
        </div>
        <div class="mf-info">
          <div class="mf-name">${esc(item.name)}${item.type==='group'?` <span style="font-size:9px;color:var(--muted)">${item.members}p</span>`:''}</div>
          <div class="mf-last ${item.unread?'unread':''}">${esc(item.lastText.slice(0,36)+(item.lastText.length>36?'...':''))}</div>
        </div>
        <div class="mf-meta">
          ${item.lastTime ? `<span class="mf-time">${relTime(item.lastTime)}</span>` : ''}
          ${item.unread ? `<span class="mf-badge">1</span>` : ''}
        </div>
      </div>
    `;
  }

  document.getElementById('mf-see-all-btn').onclick = function() {
    window.__jmgOpenFriendsListWidget();
  };

  document.getElementById('mf-create-gc-btn').onclick = function() {
    window.__jmgOpenCreateGroupWidget();
  };

  document.getElementById('mf-header').onclick = function() {
    window.__jmgToggleMiniFriends();
  };

  render();
  setInterval(render, 1000);
})();
</script>
</body>
</html>

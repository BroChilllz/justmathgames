<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Hub – JMG</title>
<style>
  :root {
    --bg: #121215;
    --surface: #1a1b1f;
    --surface2: #232527;
    --border: #34373d;
    --border-soft: #272930;
    --text: #f2f4f5;
    --muted: #9a9ca3;
    --accent: #335fff;
    --accent-hover: #416bff;
    --red: #f85a5a;
    --topbar: 48px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Builder Sans","Helvetica Neue",Helvetica,Arial,sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 200;
    height: var(--topbar);
    background: #191b1f;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s;
  }
  .back-btn:hover { background: var(--surface2); border-color: #5f626a; }

  .hub-title {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: -0.02em;
  }
  .hub-title span { color: var(--accent); }

  .search-wrap {
    flex: 1;
    max-width: 480px;
    margin-left: auto;
    position: relative;
    display: flex;
    align-items: center;
  }
  .search-wrap input {
    width: 100%;
    background: #111217;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font: inherit;
    font-size: 14px;
    padding: 8px 40px 8px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: #5f626a; background: #16171d; }
  .search-wrap input::placeholder { color: #5f626a; }
  .search-wrap button {
    position: absolute;
    right: 6px;
    background: var(--accent);
    border: none;
    border-radius: 5px;
    color: #fff;
    cursor: pointer;
    padding: 4px 10px;
    font-size: 13px;
    font-weight: 700;
  }
  .search-wrap button:hover { background: var(--accent-hover); }

  /* ── HERO BANNER ── */
  .hero {
    position: relative;
    height: 320px;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center top;
    filter: blur(2px) saturate(0.7);
    transform: scale(1.04);
    transition: background-image 0.6s;
  }
  .hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(18,18,21,0.2) 0%, rgba(18,18,21,0.85) 70%, var(--bg) 100%);
  }
  .hero-content {
    position: relative;
    z-index: 2;
    padding: 0 24px 24px;
    display: flex;
    align-items: flex-end;
    gap: 20px;
  }
  .hero-poster {
    width: 100px;
    height: 150px;
    border-radius: 6px;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.12);
    flex-shrink: 0;
    box-shadow: 0 8px 28px rgba(0,0,0,0.6);
  }
  .hero-info { flex: 1; min-width: 0; }
  .hero-title {
    font-size: 32px;
    font-weight: 900;
    line-height: 1.05;
    text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    margin-bottom: 6px;
  }
  .hero-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
  }
  .badge {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    letter-spacing: 0.04em;
  }
  .badge.rating { color: #ffd700; border-color: rgba(255,215,0,0.35); background: rgba(255,215,0,0.08); }
  .hero-overview {
    font-size: 13px;
    color: #c8cacf;
    line-height: 1.55;
    max-width: 560px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .hero-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .play-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 10px 22px;
    font: inherit;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.15s;
  }
  .play-btn:hover { background: var(--accent-hover); }
  .play-btn svg { flex-shrink: 0; }

  /* ── SECTION HEADING ── */
  .section {
    padding: 0 20px 28px;
  }
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding-top: 20px;
  }
  .section-head h2 {
    font-size: 16px;
    font-weight: 900;
    letter-spacing: -0.01em;
  }
  .section-head a {
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
  }

  /* ── GRID ── */
  .movie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
  }

  .movie-card {
    background: var(--surface);
    border: 1px solid transparent;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    position: relative;
  }
  .movie-card:hover {
    transform: translateY(-3px);
    border-color: var(--border);
    background: var(--surface2);
  }
  .movie-card img {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
  }
  .movie-card .no-poster {
    width: 100%;
    aspect-ratio: 2/3;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    color: var(--muted);
  }
  .movie-card-info {
    padding: 8px 10px 10px;
  }
  .movie-card-title {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 3px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .movie-card-year {
    font-size: 11px;
    color: var(--muted);
  }
  .movie-card-score {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,0.75);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 4px;
    font-size: 10px;
    font-weight: 800;
    color: #ffd700;
    padding: 2px 5px;
  }

  /* ── DETAIL MODAL ── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(6px);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-backdrop.open { display: flex; }

  .detail-modal {
    background: #111217;
    border: 1px solid var(--border);
    border-radius: 10px;
    width: min(860px, 100%);
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    box-shadow: 0 28px 80px rgba(0,0,0,0.65);
    position: relative;
  }
  .detail-modal::-webkit-scrollbar { width: 6px; }
  .detail-modal::-webkit-scrollbar-track { background: transparent; }
  .detail-modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .detail-backdrop-img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    object-position: center 20%;
    display: block;
    border-radius: 10px 10px 0 0;
  }
  .detail-backdrop-placeholder {
    width: 100%;
    height: 220px;
    background: linear-gradient(135deg, #1a1b21 0%, #232630 100%);
    border-radius: 10px 10px 0 0;
  }
  .detail-grad {
    height: 80px;
    margin-top: -80px;
    background: linear-gradient(to bottom, transparent, #111217);
    position: relative;
    z-index: 1;
  }

  .detail-body {
    padding: 0 20px 24px;
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 16px;
  }
  .detail-poster {
    width: 120px;
    margin-top: -50px;
    border-radius: 6px;
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    flex-shrink: 0;
  }
  .detail-info { padding-top: 8px; }
  .detail-title {
    font-size: 26px;
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .detail-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .detail-overview {
    font-size: 14px;
    color: #c8cacf;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .detail-play {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 11px 24px;
    font: inherit;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.15s;
  }
  .detail-play:hover { background: var(--accent-hover); }

  .modal-close {
    position: sticky;
    top: 10px;
    float: right;
    margin: 10px 10px -42px 0;
    z-index: 10;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(18,18,23,0.88);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover { border-color: var(--red); color: var(--red); }

  /* ── PLAYER OVERLAY ── */
  .player-overlay {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 1000;
    display: none;
    flex-direction: column;
  }
  .player-overlay.open { display: flex; }
  .player-bar {
    background: rgba(25,27,31,0.92);
    border-bottom: 1px solid var(--border-soft);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .player-bar button {
    background: rgba(242,244,245,0.9);
    border: none;
    border-radius: 6px;
    color: #191b1f;
    cursor: pointer;
    font: inherit;
    font-weight: 700;
    font-size: 13px;
    padding: 7px 12px;
  }
  .player-bar button:hover { background: #fff; }
  .player-bar .title {
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
  }
  .player-frame {
    flex: 1;
    width: 100%;
    border: none;
  }

  /* ── STATES ── */
  .state-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .state-msg .icon { font-size: 48px; margin-bottom: 14px; }
  .state-msg h3 { font-size: 18px; font-weight: 800; margin-bottom: 6px; color: var(--text); }
  .state-msg p { font-size: 14px; max-width: 340px; margin: 0 auto; }

  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border-soft);
    padding: 0 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    padding: 12px 14px;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .hero { height: 260px; }
    .hero-title { font-size: 22px; }
    .hero-poster { width: 70px; height: 105px; }
    .detail-body { grid-template-columns: 90px 1fr; }
    .detail-poster { width: 90px; margin-top: -40px; }
    .detail-title { font-size: 20px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <div class="hub-title">Movie<span>Hub</span></div>
  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="Search any movie…" autocomplete="off"
      oninput="handleSearchInput()" onkeydown="if(event.key==='Enter') doSearch()">
    <button onclick="doSearch()">Go</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" data-tab="home" onclick="switchTab('home')">Home</button>
  <button class="tab" data-tab="trending" onclick="switchTab('trending')">Trending</button>
  <button class="tab" data-tab="toprated" onclick="switchTab('toprated')">Top Rated</button>
  <button class="tab" data-tab="results" onclick="switchTab('results')" id="resultsTab" style="display:none">Search Results</button>
</div>

<!-- HERO -->
<div class="hero" id="heroSection" style="display:none">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-gradient"></div>
  <div class="hero-content">
    <img class="hero-poster" id="heroPoster" src="" alt="">
    <div class="hero-info">
      <div class="hero-title" id="heroTitle"></div>
      <div class="hero-meta" id="heroMeta"></div>
      <div class="hero-overview" id="heroOverview"></div>
      <div class="hero-actions">
        <button class="play-btn" id="heroPlayBtn" onclick="playHeroMovie()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2.5l10 5.5-10 5.5V2.5z"/></svg>
          Watch Now
        </button>
      </div>
    </div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent"></div>

<!-- DETAIL MODAL -->
<div class="modal-backdrop" id="detailModal" onclick="closeDetailIfBackdrop(event)">
  <div class="detail-modal" id="detailModalInner">
    <button class="modal-close" onclick="closeDetail()">×</button>
    <div id="detailContent"></div>
  </div>
</div>

<!-- PLAYER OVERLAY -->
<div class="player-overlay" id="playerOverlay">
  <div class="player-bar">
    <button onclick="closePlayer()">⬅ Back</button>
    <span class="title" id="playerTitle"></span>
  </div>
  <iframe class="player-frame" id="playerFrame" allowfullscreen allow="fullscreen"></iframe>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
// TMDB API key — the user should replace this with their own key from themoviedb.org
const TMDB_KEY = 'a795d5323f49d5d5f3b7d487f76d5180';
const TMDB = 'https://api.themoviedb.org/3';
const IMG_BASE = 'https://image.tmdb.org/t/p/';

// ─── STATE ───────────────────────────────────────────────────────────────────
let heroMovieId = null;
let currentTab = 'home';
let searchTimeout = null;

// ─── INIT ────────────────────────────────────────────────────────────────────
(async () => {
  const [trending, nowPlaying] = await Promise.all([
    tmdb('/trending/movie/week'),
    tmdb('/movie/now_playing')
  ]);

  const heroMovies = trending?.results || [];
  const heroMovie = heroMovies[Math.floor(Math.random() * Math.min(5, heroMovies.length))];
  if (heroMovie) renderHero(heroMovie);

  renderHomeTab({ trending: heroMovies, nowPlaying: nowPlaying?.results || [] });
})();

// ─── TMDB FETCH ───────────────────────────────────────────────────────────────
async function tmdb(path, params = {}) {
  const url = new URL(TMDB + path);
  url.searchParams.set('api_key', TMDB_KEY);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  try {
    const res = await fetch(url.toString());
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

// ─── HERO ─────────────────────────────────────────────────────────────────────
function renderHero(movie) {
  heroMovieId = movie.id;
  const bg = movie.backdrop_path ? IMG_BASE + 'original' + movie.backdrop_path : '';
  const poster = movie.poster_path ? IMG_BASE + 'w342' + movie.poster_path : '';
  const year = (movie.release_date || '').slice(0, 4);
  const score = movie.vote_average ? movie.vote_average.toFixed(1) : '';

  document.getElementById('heroBg').style.backgroundImage = bg ? `url(${bg})` : '';
  document.getElementById('heroPoster').src = poster;
  document.getElementById('heroPoster').alt = movie.title;
  document.getElementById('heroTitle').textContent = movie.title;
  document.getElementById('heroOverview').textContent = movie.overview || '';
  const meta = document.getElementById('heroMeta');
  meta.innerHTML = '';
  if (year) meta.innerHTML += `<span class="badge">${year}</span>`;
  if (score) meta.innerHTML += `<span class="badge rating">★ ${score}</span>`;
  document.getElementById('heroSection').style.display = 'flex';
}

function playHeroMovie() {
  if (heroMovieId) openPlayer(heroMovieId, document.getElementById('heroTitle').textContent);
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  if (tab === 'home') renderHomeSection();
  else if (tab === 'trending') renderSection('trending');
  else if (tab === 'toprated') renderSection('toprated');
  else if (tab === 'results') { /* already rendered */ }
}

async function renderHomeTab({ trending, nowPlaying }) {
  renderGridSection('mainContent', [
    { title: 'Trending This Week', movies: trending.slice(0, 12) },
    { title: 'Now Playing', movies: nowPlaying.slice(0, 12) }
  ]);
}

async function renderHomeSection() {
  document.getElementById('mainContent').innerHTML = skeletonGrid(2);
  const [trending, nowPlaying] = await Promise.all([
    tmdb('/trending/movie/week'),
    tmdb('/movie/now_playing')
  ]);
  renderGridSection('mainContent', [
    { title: 'Trending This Week', movies: trending?.results?.slice(0, 12) || [] },
    { title: 'Now Playing', movies: nowPlaying?.results?.slice(0, 12) || [] }
  ]);
}

async function renderSection(type) {
  document.getElementById('mainContent').innerHTML = skeletonGrid(1);
  document.getElementById('heroSection').style.display = 'none';
  let data;
  if (type === 'trending') data = await tmdb('/trending/movie/week', { page: 1 });
  else data = await tmdb('/movie/top_rated');
  const movies = data?.results || [];
  const label = type === 'trending' ? 'Trending This Week' : 'Top Rated All Time';
  renderGridSection('mainContent', [{ title: label, movies: movies.slice(0, 20) }]);
}

function renderGridSection(containerId, sections) {
  const container = document.getElementById(containerId);
  container.innerHTML = sections.map(({ title, movies }) => `
    <div class="section">
      <div class="section-head"><h2>${escHtml(title)}</h2></div>
      <div class="movie-grid">${movies.map(movieCardHtml).join('')}</div>
    </div>
  `).join('');
}

// ─── CARD HTML ────────────────────────────────────────────────────────────────
function movieCardHtml(movie) {
  const poster = movie.poster_path ? `<img src="${IMG_BASE}w300${movie.poster_path}" alt="${escHtml(movie.title)}" loading="lazy">` : `<div class="no-poster">🎬</div>`;
  const year = (movie.release_date || '').slice(0, 4);
  const score = movie.vote_average ? movie.vote_average.toFixed(1) : '';
  return `
    <div class="movie-card" onclick="openDetail(${movie.id})">
      ${poster}
      ${score ? `<span class="movie-card-score">★ ${score}</span>` : ''}
      <div class="movie-card-info">
        <div class="movie-card-title">${escHtml(movie.title)}</div>
        ${year ? `<div class="movie-card-year">${year}</div>` : ''}
      </div>
    </div>`;
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function handleSearchInput() {
  clearTimeout(searchTimeout);
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  searchTimeout = setTimeout(() => doSearch(), 400);
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;

  document.getElementById('heroSection').style.display = 'none';
  document.getElementById('resultsTab').style.display = '';
  switchTab('results');
  document.getElementById('mainContent').innerHTML = skeletonGrid(1);

  const data = await tmdb('/search/movie', { query: q });
  const movies = data?.results || [];

  if (!movies.length) {
    document.getElementById('mainContent').innerHTML = `
      <div class="state-msg"><div class="icon">🔍</div><h3>No results</h3><p>Nothing found for "${escHtml(q)}". Try a different title.</p></div>`;
    return;
  }
  renderGridSection('mainContent', [{ title: `Results for "${q}"`, movies }]);
}

// ─── DETAIL MODAL ─────────────────────────────────────────────────────────────
async function openDetail(id) {
  document.getElementById('detailModal').classList.add('open');
  document.getElementById('detailContent').innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted)">Loading…</div>`;

  const [movie, credits] = await Promise.all([
    tmdb(`/movie/${id}`, { append_to_response: 'release_dates' }),
    tmdb(`/movie/${id}/credits`)
  ]);
  if (!movie) {
    document.getElementById('detailContent').innerHTML = `<div style="padding:40px;text-align:center;color:var(--red)">Failed to load movie details.</div>`;
    return;
  }

  const backdrop = movie.backdrop_path ? `<img class="detail-backdrop-img" src="${IMG_BASE}w1280${movie.backdrop_path}" alt="">` : `<div class="detail-backdrop-placeholder"></div>`;
  const poster = movie.poster_path ? `<img class="detail-poster" src="${IMG_BASE}w342${movie.poster_path}" alt="${escHtml(movie.title)}">` : `<div class="detail-poster" style="height:180px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:40px;border-radius:6px">🎬</div>`;
  const year = (movie.release_date || '').slice(0, 4);
  const runtime = movie.runtime ? `${Math.floor(movie.runtime/60)}h ${movie.runtime%60}m` : '';
  const score = movie.vote_average ? movie.vote_average.toFixed(1) : '';
  const genres = (movie.genres || []).map(g => `<span class="badge">${escHtml(g.name)}</span>`).join('');
  const cast = (credits?.cast || []).slice(0, 5).map(p => p.name).join(', ');

  // Get US rating
  let rating = '';
  const usRelease = (movie.release_dates?.results || []).find(r => r.iso_3166_1 === 'US');
  if (usRelease) {
    const cert = usRelease.release_dates.find(d => d.certification);
    if (cert?.certification) rating = cert.certification;
  }

  document.getElementById('detailContent').innerHTML = `
    ${backdrop}
    <div class="detail-grad"></div>
    <div class="detail-body">
      ${poster}
      <div class="detail-info">
        <div class="detail-title">${escHtml(movie.title)}</div>
        <div class="detail-meta">
          ${year ? `<span class="badge">${year}</span>` : ''}
          ${runtime ? `<span class="badge">${runtime}</span>` : ''}
          ${score ? `<span class="badge rating">★ ${score}</span>` : ''}
          ${rating ? `<span class="badge">${escHtml(rating)}</span>` : ''}
          ${genres}
        </div>
        ${cast ? `<div style="font-size:12px;color:var(--muted);margin-bottom:10px"><b style="color:var(--text)">Cast:</b> ${escHtml(cast)}</div>` : ''}
        <div class="detail-overview">${escHtml(movie.overview || 'No description available.')}</div>
        <button class="detail-play" onclick="openPlayer(${movie.id}, '${escHtml(movie.title).replace(/'/g,"\\'")}')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2.5l10 5.5-10 5.5V2.5z"/></svg>
          Watch Now
        </button>
      </div>
    </div>
  `;
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('open');
}

function closeDetailIfBackdrop(e) {
  if (e.target === document.getElementById('detailModal')) closeDetail();
}

// ─── PLAYER ───────────────────────────────────────────────────────────────────
function openPlayer(tmdbId, title) {
  closeDetail();
  document.getElementById('playerTitle').textContent = title;
  document.getElementById('playerFrame').src = `https://vidsrcme.ru/embed/movie?tmdb=${tmdbId}`;
  document.getElementById('playerOverlay').classList.add('open');
}

function closePlayer() {
  document.getElementById('playerOverlay').classList.remove('open');
  document.getElementById('playerFrame').src = '';
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function skeletonGrid(count) {
  return Array(count).fill(0).map(() => `
    <div class="section">
      <div class="section-head"><div class="skeleton" style="width:160px;height:18px"></div></div>
      <div class="movie-grid">${Array(8).fill(0).map(() => `
        <div>
          <div class="skeleton" style="width:100%;aspect-ratio:2/3;border-radius:8px;"></div>
          <div class="skeleton" style="margin-top:8px;height:13px;width:80%;border-radius:4px;"></div>
          <div class="skeleton" style="margin-top:5px;height:11px;width:40%;border-radius:4px;"></div>
        </div>`).join('')}
      </div>
    </div>`).join('');
}

// Keyboard: Escape closes overlays
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('playerOverlay').classList.contains('open')) closePlayer();
    else closeDetail();
  }
});
</script>
</body>
</html>
